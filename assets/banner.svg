<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 220" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#161b22"/>
      <stop offset="1" stop-color="#1f2a44"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="220" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="6" height="220" rx="3" fill="url(#accent)"/>

  <!-- shield + db motif -->
  <g transform="translate(70,58)">
    <path d="M52 2 L98 18 V58 C98 92 78 108 52 118 C26 108 6 92 6 58 V18 Z"
          fill="none" stroke="url(#accent)" stroke-width="3"/>
    <ellipse cx="52" cy="40" rx="26" ry="9" fill="none" stroke="#58a6ff" stroke-width="2.5"/>
    <path d="M26 40 V70 C26 75 38 80 52 80 C66 80 78 75 78 70 V40" fill="none" stroke="#58a6ff" stroke-width="2.5"/>
    <path d="M26 55 C26 60 38 65 52 65 C66 65 78 60 78 55" fill="none" stroke="#58a6ff" stroke-width="2.5"/>
    <path d="M38 60 l10 10 l18 -20" fill="none" stroke="#56d364" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="210" y="92" font-size="46" font-weight="800" fill="#e6edf3">mcp-db-server</text>
  <text x="212" y="128" font-size="19" fill="#9da7b3">Talk to your SQL database in natural language —</text>
  <text x="212" y="154" font-size="19" fill="#9da7b3"><tspan fill="#58a6ff" font-weight="700">read-only</tspan>, <tspan fill="#a371f7" font-weight="700">AST-validated</tspan>, and capped.</text>

  <text x="212" y="190" font-size="13.5" fill="#6e7681">An MCP server · the LLM writes the SQL, the server never trusts it</text>
</svg>
